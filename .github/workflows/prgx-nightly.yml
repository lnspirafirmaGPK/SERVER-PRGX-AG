name: prgx-nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: prgx-nightly-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging

    env:
      PRGX_AG_DRY_RUN: "true"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install project and workflow dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev] ruff mypy

      - name: Validate source tree compiles
        run: python -m compileall src

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: mypy src/prgx_ag --ignore-missing-imports

      - name: Run observational scan
        run: python -m prgx_ag.main --scan-only

      - name: Run nightly automation cycle
        run: python -m prgx_ag.main --once

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prgx-nightly-artifacts
          path: .prgx-ag/
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 14
