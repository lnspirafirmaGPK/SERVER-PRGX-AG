name: prgx-heal-pr
on:
  workflow_dispatch:
  schedule:
    - cron: '15 2 * * *'
jobs:
  heal:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      PRGX_AG_DRY_RUN: 'true'
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[dev]
      - run: python -m prgx_ag.main --once
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prgx-heal-report
          path: .prgx-ag/
