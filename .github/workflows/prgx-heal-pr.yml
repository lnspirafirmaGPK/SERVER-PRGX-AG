name: prgx-heal-pr

on:
  workflow_dispatch:
  schedule:
    - cron: "15 2 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: prgx-heal-pr-${{ github.ref }}
  cancel-in-progress: false

jobs:
  heal:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: staging
    env:
      PRGX_AG_DRY_RUN: "false"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install project and workflow dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev] ruff mypy

      - name: Validate source tree compiles
        run: python -m compileall src

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: mypy src/prgx_ag --ignore-missing-imports

      - name: Run PRGX healing cycle
        run: python -m prgx_ag.main --once

      - name: Capture runtime reports
        if: always()
        run: |
          mkdir -p .prgx-ag
          git status --short > .prgx-ag/git-status.txt || true
          git diff --stat > .prgx-ag/git-diff-stat.txt || true
          git diff --name-only > .prgx-ag/git-diff-files.txt || true

      - name: Exclude runtime state from pull request
        if: always()
        run: |
          git restore --source=HEAD --staged --worktree .prgx-ag || true
          git clean -fd -- .prgx-ag || true

      - name: Prepare governed healing metadata
        id: metadata
        if: always()
        run: |
          python - <<'PY' > "$RUNNER_TEMP/heal_pr_metadata.json"
          import json
          import subprocess

          from prgx_ag.services.github_bridge import (
              format_pr_body,
              format_pr_title,
              prepare_pr_branch_name,
          )

          result = subprocess.run(
              ["git", "diff", "--name-only"],
              check=True,
              capture_output=True,
              text=True,
          )
          changed_files = [
              line.strip()
              for line in result.stdout.splitlines()
              if line.strip() and not line.startswith('.prgx-ag/')
          ]

          findings_summary = {
              'summary': 'Governed safe healing changes generated from the PRGX pipeline.',
              'target': 'repository',
              'issue_count': len(changed_files),
          }
          fix_classes = ['structural.package_marker'] if changed_files else []
          rollback_instructions = [
              f'Revert {path} if verification later identifies unintended package-marker drift.'
              for path in changed_files
          ]
          verification_commands = ['compileall', 'ruff', 'mypy']
          verification_result = 'pending'
          audit_result = 'approved'

          payload = {
              'branch': prepare_pr_branch_name(),
              'title': format_pr_title(
                  findings_summary=findings_summary,
                  audit_result=audit_result,
                  verification_result=verification_result,
                  fix_classes=fix_classes or ['structural.review_pending'],
              ),
              'body': format_pr_body(
                  findings_summary=findings_summary,
                  audit_result=audit_result,
                  changed_files=changed_files,
                  verification_result=verification_result,
                  rollback_instructions=rollback_instructions,
                  fix_classes=fix_classes or ['structural.review_pending'],
                  verification_commands=verification_commands,
              ),
          }
          print(json.dumps(payload))
          PY

          python - <<'PY'
          import json
          import os
          from pathlib import Path

          payload = json.loads(Path(os.environ['RUNNER_TEMP'], 'heal_pr_metadata.json').read_text(encoding='utf-8'))
          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as fh:
              fh.write(f"branch={payload['branch']}\n")
              fh.write(f"title={payload['title']}\n")
              fh.write("body<<EOF\n")
              fh.write(payload['body'])
              fh.write("\nEOF\n")
          PY

      - name: Run post-fix verification
        id: verify
        if: always()
        run: |
          set +e
          python -m compileall src
          compile_status=$?
          ruff check .
          ruff_status=$?
          mypy src/prgx_ag --ignore-missing-imports
          mypy_status=$?

          if [ $compile_status -eq 0 ] && [ $ruff_status -eq 0 ] && [ $mypy_status -eq 0 ]; then
            echo "result=passed" >> "$GITHUB_OUTPUT"
          else
            echo "result=failed" >> "$GITHUB_OUTPUT"
          fi
          exit 0

      - name: Revert workspace on verification failure
        if: steps.verify.outputs.result == 'failed'
        run: |
          git restore --source=HEAD --staged --worktree .
          git clean -fd

      - name: Publish blocked narrative summary
        if: steps.verify.outputs.result == 'failed'
        run: |
          {
            echo "## PRGX Heal PR"
            echo ""
            echo "- Verification result: \`failed\`"
            echo "- Narrative: blocked governed repair; workspace reverted before PR creation"
            echo "- Action: no PR opened because post-fix verification did not pass"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload healing artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prgx-heal-report
          path: .prgx-ag/
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 14

      - name: Exclude runtime state from pull request after artifact upload
        if: always()
        run: |
          git restore --source=HEAD --staged --worktree .prgx-ag || true
          git clean -fd -- .prgx-ag || true

      - name: Detect repository changes
        id: changes
        if: steps.verify.outputs.result != 'failed'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request for safe healing changes
        if: steps.verify.outputs.result != 'failed' && steps.changes.outputs.has_changes == 'true'
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.metadata.outputs.branch }}
          delete-branch: true
          commit-message: ${{ steps.metadata.outputs.title }}
          title: ${{ steps.metadata.outputs.title }}
          body: ${{ steps.metadata.outputs.body }}
          labels: |
            automation
            prgx-healing

      - name: Write workflow summary
        if: always()
        run: |
          {
            echo "## PRGX Heal PR"
            echo ""
            echo "- Verification result: \`${{ steps.verify.outputs.result || 'not-run' }}\`"
            if [ "${{ steps.verify.outputs.result }}" = "failed" ]; then
              echo "- Pull request URL: none (blocked narrative published)"
            elif [ "${{ steps.changes.outputs.has_changes }}" = "true" ]; then
              echo "- Changes detected: \`true\`"
              echo "- Pull request URL: ${{ steps.cpr.outputs.pull-request-url }}"
              echo "- Pull request operation: ${{ steps.cpr.outputs.pull-request-operation }}"
            else
              echo "- Changes detected: \`false\`"
              echo "- Pull request URL: none"
            fi
            echo "- Artifact: \`prgx-heal-report\`"
          } >> "$GITHUB_STEP_SUMMARY"
