name: prgx-test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Gating job: fast repository-health checks that must pass before broader execution.
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project and quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev] ruff mypy

      - name: Validate source tree compiles
        run: python -m compileall src

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: mypy src/prgx_ag --ignore-missing-imports

      - name: Run governed integration gate
        run: pytest -q tests/test_pipeline_integration.py tests/test_nexus_cycle.py --maxfail=1

  # Gating job: matrix test execution after the fast quality gate passes.
  test:
    runs-on: ubuntu-latest
    needs: quality

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate source tree compiles
        run: python -m compileall src

      - name: Run test suite
        run: pytest -q --maxfail=1
