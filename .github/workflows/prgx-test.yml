name: prgx-test

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: prgx-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install project and quality dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev] ruff mypy

      - name: Validate source tree compiles
        run: python -m compileall src

      - name: Ruff lint
        run: ruff check .

      - name: Mypy type check
        run: mypy src/prgx_ag --ignore-missing-imports

      - name: Run governed integration gate
        run: pytest -q tests/test_pipeline_integration.py tests/test_nexus_cycle.py --maxfail=1

  test:
    runs-on: ubuntu-latest
    needs: quality
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install project and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate source tree compiles
        run: python -m compileall src

      - name: Run test suite
        run: pytest -q --maxfail=1
