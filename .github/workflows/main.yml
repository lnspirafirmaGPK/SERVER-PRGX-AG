name: PRGX-AG Main

on:
  push:
    branches:
      - main
      - master
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: scan-only | once | test-only"
        required: false
        default: "once"
      dry_run:
        description: "Dry run mode"
        required: false
        default: "true"
      target_environment:
        description: "GitHub Environment: development | staging | production"
        required: false
        default: "staging"
  schedule:
    - cron: "*/30 * * * *"

permissions:
  contents: read

concurrency:
  group: prgx-ag-main-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONUNBUFFERED: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PRGX_AG_DRY_RUN: "true"
  PRGX_AG_ENV: "ci"
  PRGX_LOG_DIR: ".prgx-ag/artifacts"

jobs:
  prgx-main:
    name: Scan, Once, and Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment || (github.ref_name == 'main' && 'production' || github.ref_name == 'master' && 'production' || github.ref_name == 'develop' && 'staging' || 'development') }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set workflow env from dispatch inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "PRGX_WORKFLOW_MODE=${{ github.event.inputs.mode }}" >> "$GITHUB_ENV"
          echo "PRGX_AG_DRY_RUN=${{ github.event.inputs.dry_run }}" >> "$GITHUB_ENV"
          echo "PRGX_DEPLOY_ENV=${{ github.event.inputs.target_environment }}" >> "$GITHUB_ENV"

      - name: Set branch-derived environment defaults
        if: github.event_name != 'workflow_dispatch'
        run: |
          echo "PRGX_WORKFLOW_MODE=once" >> "$GITHUB_ENV"
          if [ "${GITHUB_REF_NAME}" = "main" ] || [ "${GITHUB_REF_NAME}" = "master" ]; then
            echo "PRGX_DEPLOY_ENV=production" >> "$GITHUB_ENV"
          elif [ "${GITHUB_REF_NAME}" = "develop" ]; then
            echo "PRGX_DEPLOY_ENV=staging" >> "$GITHUB_ENV"
          else
            echo "PRGX_DEPLOY_ENV=development" >> "$GITHUB_ENV"
          fi

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e .[dev] ruff mypy

      - name: Prepare artifact directories
        run: |
          mkdir -p .prgx-ag/artifacts .prgx-ag/audit .prgx-ag/state

      - name: Announce workflow environment
        run: |
          echo "Using GitHub Environment: ${PRGX_DEPLOY_ENV}"

      - name: Validate source tree compiles
        run: python -m compileall src

      - name: Run PRGX scan-only
        if: env.PRGX_WORKFLOW_MODE != 'test-only'
        run: |
          set -e
          if command -v prgx-ag >/dev/null 2>&1; then
            prgx-ag --scan-only | tee .prgx-ag/artifacts/prgx-scan.log
          else
            python -m prgx_ag.main --scan-only | tee .prgx-ag/artifacts/prgx-scan.log
          fi

      - name: Run PRGX once cycle
        if: env.PRGX_WORKFLOW_MODE == 'once'
        run: |
          set -e
          if command -v prgx-ag >/dev/null 2>&1; then
            prgx-ag --once | tee .prgx-ag/artifacts/prgx-once.log
          else
            python -m prgx_ag.main --once | tee .prgx-ag/artifacts/prgx-once.log
          fi

      - name: Run tests
        if: env.PRGX_WORKFLOW_MODE != 'scan-only'
        run: |
          pytest -q --maxfail=1 --disable-warnings | tee .prgx-ag/artifacts/pytest.log

      - name: Upload PRGX artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prgx-ag-artifacts-${{ github.run_id }}
          path: |
            .prgx-ag/artifacts/**
            .prgx-ag/audit/**
            .prgx-ag/state/**
          if-no-files-found: warn
          include-hidden-files: true

      - name: Upload pytest cache
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prgx-ag-pytest-cache-${{ github.run_id }}
          path: |
            .pytest_cache/**
          if-no-files-found: ignore
          include-hidden-files: true
