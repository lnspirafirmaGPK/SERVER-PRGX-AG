name: prgx-scan

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  # Observational job: scans repository state and uploads runtime artifacts for inspection.
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install project and workflow dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate source tree compiles
        run: python -m compileall src

      - name: Run observational scan
        run: python -m prgx_ag.main --scan-only

      - name: Upload scan state
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prgx-scan-state
          path: .prgx-ag/state/
