name: prgx-scan
on:
  push:
  pull_request:
  workflow_dispatch:
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -e .[dev]
      - run: python -m prgx_ag.main --scan-only
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: prgx-scan-state
          path: .prgx-ag/state/
