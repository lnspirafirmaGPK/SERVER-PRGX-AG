name: prgx-scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: prgx-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PRGX_RUNTIME_PROFILE: "development"
      PRGX_AUDIT_WINDOW_HOURS: "24"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install project and workflow dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .[dev]

      - name: Validate source tree compiles
        run: python -m compileall src

      - name: Run observational scan
        run: python -m prgx_ag.main --scan-only

      - name: Upload scan state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prgx-scan-state
          path: |
            .prgx-ag/state/
            .prgx-ag/evidence/
          if-no-files-found: ignore
          include-hidden-files: true
          retention-days: 14
